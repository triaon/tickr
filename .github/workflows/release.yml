name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cli:
    name: cli binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - run: ./scripts/build-all.sh
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/tickr-*

  desktop:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: mac-arm64
            os: macos-14
            rust_target: aarch64-apple-darwin
            go_os: darwin
            go_arch: arm64
            bin_suffix: ""
          - label: linux-x64
            os: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            go_os: linux
            go_arch: amd64
            bin_suffix: ""
          - label: windows-x64
            os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            go_os: windows
            go_arch: amd64
            bin_suffix: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: install Linux deps
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libssl-dev

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: build Go sidecar (${{ matrix.go_os }}/${{ matrix.go_arch }})
        shell: bash
        env:
          GOOS: ${{ matrix.go_os }}
          GOARCH: ${{ matrix.go_arch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p ui/src-tauri/binaries
          go build -trimpath -ldflags="-s -w" \
            -o "ui/src-tauri/binaries/tickr-cli-${{ matrix.rust_target }}${{ matrix.bin_suffix }}" \
            ./cmd/tickr

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ui/src-tauri -> target

      - run: npm ci
        working-directory: ui

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ui
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: "See CHANGELOG.md"
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.rust_target }}
